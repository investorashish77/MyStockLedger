name: PR Quality Gate

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Compile check
        run: |
          PYTHONPYCACHEPREFIX=.pycache_local python -m py_compile \
            services/background_job_service.py \
            services/watchman_service.py \
            ui/main_window.py \
            ui/alerts_view.py

      - name: Run service tests
        run: |
          PYTHONPYCACHEPREFIX=.pycache_local python tests/test_services.py

      - name: Run AI review gate (must pass)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_REVIEW_PROVIDER: ${{ vars.AI_REVIEW_PROVIDER }}
          AI_REVIEW_FAIL_ON_SEVERITY: ${{ vars.AI_REVIEW_FAIL_ON_SEVERITY }}
        run: |
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY secret is required for AI review gate." >&2
            exit 1
          fi
          PYTHONPYCACHEPREFIX=.pycache_local python3 scripts/ai_code_review.py \
            --base main \
            --provider "${AI_REVIEW_PROVIDER:-openai}" \
            --fail-on-severity "${AI_REVIEW_FAIL_ON_SEVERITY:-high}" \
            --run-tests ""
